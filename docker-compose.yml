name: nac-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - ./volumes/postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - nac-net

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./volumes/redis/data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - nac-net

  freeradius:
    image: freeradius/freeradius-server:latest
    ports:
      - "${RADIUS_AUTH_PORT}:1812/udp"
      - "${RADIUS_ACCOUNTING_PORT}:1813/udp"
    volumes:
      # FreeRADIUS config'i custom altına mount ediyoruz (Windows permission sorunu için)
      - ./freeradius/config:/etc/freeradius/custom:ro
      - ./volumes/freeradius/log:/var/log/freeradius
    entrypoint:
      - /bin/sh
      - -lc
      - "tr -d '\\r' < /etc/freeradius/custom/bootstrap.sh > /tmp/bootstrap.sh && /bin/sh /tmp/bootstrap.sh"
    environment:
      RADIUS_SHARED_SECRET: "${RADIUS_SHARED_SECRET}"
      RADIUS_REST_AUTH_URL: "${RADIUS_REST_AUTH_URL}"
      RADIUS_REST_AUTHORIZE_URL: "${RADIUS_REST_AUTHORIZE_URL}"
      FREERADIUS_DEBUG: "${FREERADIUS_DEBUG:-0}"
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[f]reeradius'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - nac-net

  api:
    build:
      context: ./api
    ports:
      - "${API_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_ENV: "${API_ENV:-local}"

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"

      REDIS_HOST: redis
      REDIS_PORT: 6379

      RADIUS_HOST: freeradius
      RADIUS_AUTH_PORT: 1812
      RADIUS_ACCOUNTING_PORT: 1813

      # Auth rate limiting (Redis)
      AUTH_RATE_MAX_ATTEMPTS: "${AUTH_RATE_MAX_ATTEMPTS:-5}"
      AUTH_RATE_WINDOW_SECONDS: "${AUTH_RATE_WINDOW_SECONDS:-60}"
      AUTH_RATE_BLOCK_SECONDS: "${AUTH_RATE_BLOCK_SECONDS:-300}"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).read()\""
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - nac-net
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      # Canlı geliştirme: kod değişince API otomatik reload alsın.
      - ./api:/app

networks:
  nac-net:
    name: nac-local-net
    driver: bridge

