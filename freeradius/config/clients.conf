# Managed by repo: ./freeradius/config/clients.conf
#
# Shared secret `.env` üzerinden gelir:
# - docker-compose -> container env: RADIUS_SHARED_SECRET
#
# FreeRADIUS: %{env:VAR} ile env okur.

client localhost {
  ipaddr = 127.0.0.1
  proto = *
  secret = %{env:RADIUS_SHARED_SECRET}
}

# radtest container içinden geliyorsa NAS-IP genelde bridge IP olur.
client docker_bridge {
  ipaddr = 172.18.0.0/16
  proto = *
  secret = %{env:RADIUS_SHARED_SECRET}
}

